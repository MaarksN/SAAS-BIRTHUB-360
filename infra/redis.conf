# Redis Configuration for Production

# Memory Management
maxmemory 512mb # Adjust based on container limits (75% of RAM)
maxmemory-policy allkeys-lru

# Persistence (AOF)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Network Security
bind 0.0.0.0
protected-mode yes
# requirepass is handled via command line argument in docker-compose

# Performance Tuning
tcp-keepalive 300
timeout 0
tcp-backlog 511
databases 16

# Logging
loglevel notice
