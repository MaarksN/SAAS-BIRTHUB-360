# Redis configuration file

# Network
bind 0.0.0.0
protected-mode no
port 6379

# Memory Management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Snapshotting
save 900 1
save 300 10
save 60 10000

# Security
# requirepass your_strong_password_here (Uncomment in production)

# Performance
tcp-keepalive 300
timeout 0
