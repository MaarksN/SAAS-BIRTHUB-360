version: '3.8'

services:
  # Load Balancer (Entry Point)
  proxy-staging:
    image: nginx:alpine
    ports:
      - "8080:80"   # Different public port for Staging
      - "8443:443"
    networks:
      - staging-network
    depends_on:
      - web-staging
    restart: unless-stopped
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro

  # Next.js Web App
  web-staging:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL_STAGING}
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@pgbouncer-staging:6432/salesos_staging
      REDIS_URL: redis://redis-staging:6379
      NODE_ENV: staging
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET_STAGING}
      NEXTAUTH_URL: ${NEXTAUTH_URL_STAGING}
    networks:
      - staging-network
    depends_on:
      - pgbouncer-staging
      - redis-staging
    restart: unless-stopped

  # Worker (Scraping & AI)
  worker-staging:
    build:
      context: .
      dockerfile: apps/ai-agents/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@pgbouncer-staging:6432/salesos_staging
      REDIS_URL: redis://redis-staging:6379
      NODE_ENV: staging
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - staging-network
    depends_on:
      - pgbouncer-staging
      - redis-staging
    restart: unless-stopped

  # Database
  db-staging:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: salesos_staging
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    networks:
      - staging-network
    restart: unless-stopped

  # Connection Pooler
  pgbouncer-staging:
    image: edoburu/pgbouncer
    environment:
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db-staging
      DB_NAME: salesos_staging
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 10
    networks:
      - staging-network
    depends_on:
      - db-staging
    restart: unless-stopped

  # Redis (Queue Broker)
  redis-staging:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redisdata-staging:/data
      - ./infra/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - staging-network
    restart: unless-stopped

networks:
  staging-network:
    driver: bridge
    internal: false

volumes:
  pgdata-staging:
  redisdata-staging:
