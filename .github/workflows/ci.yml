name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  validate-ts:
    name: Validate TypeScript (Lint, Type-Check, Test)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high --production

      - name: Database Migration Check
        run: |
          npx prisma generate --schema=libs/core/src/schema.prisma
          npx prisma migrate deploy --schema=libs/core/src/schema.prisma
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          SKIP_ENV_VALIDATION: 1

      - name: Lint
        run: npx turbo run lint
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Type Check
        run: npx turbo run type-check --continue
        env:
          SKIP_ENV_VALIDATION: 1

      - name: Test
        run: npx turbo run test --continue
        env:
          SKIP_ENV_VALIDATION: 1
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379"

  validate-python:
    name: Validate Python (Lint, Test)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./apps/ai-agents
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest mypy types-redis types-requests

      - name: Lint with Flake8
        working-directory: ./apps/ai-agents
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type Check with MyPy
        working-directory: ./apps/ai-agents
        run: mypy . --ignore-missing-imports

      - name: Test with Pytest
        working-directory: ./apps/ai-agents
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: pytest
