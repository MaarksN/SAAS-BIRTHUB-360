name: Deploy Production

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/salesos-web:production,${{ secrets.DOCKERHUB_USERNAME }}/salesos-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.salesos.io

      - name: Build and push AI Agents
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ai-agents/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/salesos-ai-agents:production,${{ secrets.DOCKERHUB_USERNAME }}/salesos-ai-agents:latest

  deploy:
    name: Deploy to Production
    needs: build-and-push
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/salesos
            git pull
            export DOCKER_IMAGE_WEB=${{ secrets.DOCKERHUB_USERNAME }}/salesos-web
            export DOCKER_IMAGE_WORKER=${{ secrets.DOCKERHUB_USERNAME }}/salesos-ai-agents
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            ./scripts/health-check.sh
