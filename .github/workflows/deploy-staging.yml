name: Deploy Staging

on:
  push:
    branches: ["develop"]

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/salesos-web:staging
          build-args: |
            NEXT_PUBLIC_API_URL=https://staging-api.salesos.io

      - name: Build and push AI Agents
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/ai-agents/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/salesos-ai-agents:staging

  deploy:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/salesos
            git pull
            # Ensure staging config exists or use prod as base
            docker-compose -f docker-compose.staging.yml pull
            docker-compose -f docker-compose.staging.yml up -d
            ./scripts/health-check.sh
