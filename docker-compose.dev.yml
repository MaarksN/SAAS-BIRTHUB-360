version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: salesos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  ai-agents:
    build:
      context: ./apps/ai-agents
      dockerfile: ../../infra/docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai-agents:/app
volumes:
  postgres_data:
