version: '3.8'

services:
  # Load Balancer (Entry Point)
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public-network
      - backend-network
    depends_on:
      - web
    restart: unless-stopped
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@pgbouncer:6432/salesos
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    networks:
      - backend-network
    depends_on:
      - pgbouncer
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker (Scraping & AI)
  worker:
    build:
      context: .
      dockerfile: apps/ai-agents/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@pgbouncer:6432/salesos
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - backend-network
    depends_on:
      - pgbouncer
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: salesos
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_NAME: salesos
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    networks:
      - backend-network
    depends_on:
      - db
    restart: unless-stopped

  # Backup Service Sidecar
  backup:
    image: postgres:15-alpine
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_NAME: salesos
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - backupdata:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
    networks:
      - backend-network
    depends_on:
      - db
    entrypoint: ["/bin/sh", "-c"]
    # Run backup every day at 3am
    command:
      - |
        echo "0 3 * * * /usr/local/bin/backup.sh >> /var/log/cron.log 2>&1" > /etc/crontabs/root
        crond -f -l 8

  # Redis (Queue Broker)
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redisdata:/data
      - ./infra/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  public-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  pgdata:
  redisdata:
  backupdata:
