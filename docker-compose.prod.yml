version: '3.8'

services:
  # Load Balancer (Entry Point)
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - public-network
      - backend-network
    depends_on:
      - web
    restart: unless-stopped
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro

  # Next.js Web App
  web:
    image: ${DOCKER_IMAGE_WEB:-salesos-web}:production
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/salesos
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    networks:
      - backend-network
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Worker (Scraping & AI)
  worker:
    image: ${DOCKER_IMAGE_WORKER:-salesos-ai-agents}:production
    build:
      context: .
      dockerfile: apps/ai-agents/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/salesos
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - backend-network
    depends_on:
      - db
      - redis
    restart: unless-stopped
    # Worker is heavy, might need limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: salesos
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Queue Broker)
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redisdata:/data
      - ./infra/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Database Backup Service
  backup:
    image: postgres:15-alpine
    environment:
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: salesos
    volumes:
      - ./scripts/backup.sh:/scripts/backup.sh:ro
      - backups:/backups
    networks:
      - backend-network
    depends_on:
      - db
    restart: unless-stopped
    command: /bin/sh -c "while true; do sh /scripts/backup.sh; echo 'Sleeping for 24h...'; sleep 86400; done"

networks:
  public-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true # No external access

volumes:
  pgdata:
  redisdata:
  backups:
